---
deployment:
  tasks:
    - export DEPLOYPATH=/home/dorjfr0cmymf/public_html
    
    # 1. Install dependencies
    - /usr/local/bin/npm install
    
    # 2. Build the project to generate the 'dist' folder
    - /usr/local/bin/npm run build
    
    # 3. Deploy the 'dist' folder contents to public_html
    # Using rsync to sync files and handle hidden files like .htaccess
    # If rsync is not available, fallback to cp
    - /usr/bin/rsync -avz --delete dist/ $DEPLOYPATH/ || /bin/cp -RT dist/ $DEPLOYPATH/
    
    # 4. Success log
    - echo "Deployment to $DEPLOYPATH finished successfully."
